<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AutoSouk.ma | بيع وحجز السيارات في المغرب</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f8f9fa;
        }
    </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

/* ===== أيقونات SVG ===== */

// أيقونة الموقع
const LocationIcon = () => (
  <svg className="w-4 h-4 inline ml-1" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
    <path strokeLinecap="round" strokeLinejoin="round" d="M12 21s-6-5.686-6-10a6 6 0 1112 0c0 4.314-6 10-6 10z"/>
    <circle cx="12" cy="11" r="2"/>
  </svg>
);

// أيقونة التقويم
const CalendarIcon = () => (
  <svg className="w-4 h-4 inline ml-1" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
    <rect x="3" y="4" width="18" height="18" rx="2"/>
    <line x1="16" y1="2" x2="16" y2="6"/>
    <line x1="8" y1="2" x2="8" y2="6"/>
  </svg>
);

// أيقونة البطاقة البنكية
const CardIcon = () => (
  <svg className="w-12 h-12 mx-auto mb-4 text-green-600" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
    <rect x="2" y="5" width="20" height="14" rx="2"/>
    <line x1="2" y1="10" x2="22" y2="10"/>
  </svg>
);

/* ===== التطبيق ===== */
const App = () => {

  // بيانات السيارات
  const [cars, setCars] = useState([
    { id: 1, brand: "Dacia", model: "Duster", price: "145,000", city: "الدار البيضاء", year: "2021", status: "available",
      img: "https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?auto=format&fit=crop&w=500&q=60" },
    { id: 2, brand: "Volkswagen", model: "Golf 7", price: "185,000", city: "الرباط", year: "2018", status: "available",
      img: "https://images.unsplash.com/photo-1541899481282-d53bffe3c35d?auto=format&fit=crop&w=500&q=60" },
    { id: 3, brand: "Renault", model: "Clio 5", price: "130,000", city: "طنجة", year: "2020", status: "reserved",
      img: "https://images.unsplash.com/photo-1594535182308-8ffefbb661e1?auto=format&fit=crop&w=500&q=60" }
  ]);

  // التحكم في نافذة الدفع
  const [showPayment, setShowPayment] = useState(false);

  // السيارة المختارة
  const [selectedCar, setSelectedCar] = useState(null);

  // عند الضغط على حجز
  const handleReserve = (car) => {
    if (car.status !== "available") return;
    setSelectedCar(car);
    setShowPayment(true);
  };

  // محاكاة الدفع
  const confirmPayment = () => {
    setCars(cars.map(c =>
      c.id === selectedCar.id ? { ...c, status: "reserved" } : c
    ));
    setShowPayment(false);
    setSelectedCar(null);
    alert("✅ تم دفع 500 درهم بنجاح! السيارة الآن محجوزة.");
  };

  return (
    <div className="min-h-screen bg-gray-50">

      {/* ===== الهيدر ===== */}
      <nav className="bg-white shadow-sm p-4 border-b">
        <div className="max-w-6xl mx-auto flex justify-between items-center">
          <h1 className="text-2xl font-bold text-green-700">
            Auto<span className="text-blue-900">Souk</span>.ma
          </h1>
          <button className="bg-green-700 text-white px-5 py-2 rounded-full font-bold">
            أضف سيارتك
          </button>
        </div>
      </nav>

      {/* ===== البانر ===== */}
      <div className="bg-gradient-to-r from-green-900 to-green-700 text-white py-16 text-center">
        <h2 className="text-4xl font-bold mb-4">احجز سيارتك بكل ثقة</h2>
        <p className="text-xl opacity-90">500 درهم فقط لتجميد الإعلان</p>
      </div>

      {/* ===== السيارات ===== */}
      <div className="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-8">
        {cars.map(car => (
          <div key={car.id} className="bg-white rounded-2xl shadow-lg overflow-hidden hover:scale-105 transition">
            <img src={car.img} className="w-full h-56 object-cover"/>
            <div className="p-5">
              <h3 className="text-xl font-bold">{car.brand} {car.model}</h3>
              <p className="text-green-600 text-2xl font-bold my-2">{car.price} DH</p>

              <div className="flex justify-between text-sm text-gray-500 border-t pt-3">
                <span><LocationIcon /> {car.city}</span>
                <span><CalendarIcon /> {car.year}</span>
              </div>

              <button
                disabled={car.status !== "available"}
                onClick={() => handleReserve(car)}
                className={`w-full mt-4 py-3 rounded-xl font-bold
                  ${car.status === "available"
                    ? "bg-orange-500 text-white hover:bg-orange-600"
                    : "bg-gray-200 text-gray-500"}`}
              >
                {car.status === "available" ? "حجز السيارة (500 DH)" : "محجوزة"}
              </button>
            </div>
          </div>
        ))}
      </div>

      {/* ===== نافذة الدفع ===== */}
      {showPayment && (
        <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50">
          <div className="bg-white p-8 rounded-3xl max-w-md w-full text-center">
            <CardIcon />
            <h3 className="text-2xl font-bold mb-2">
              تأكيد حجز {selectedCar.brand} {selectedCar.model}
            </h3>
            <p className="text-gray-600 mb-6">
              سيتم خصم <strong>500 درهم</strong> لحجز السيارة لمدة 48 ساعة
            </p>

            <input type="text" placeholder="**** **** **** ****"
              className="w-full border p-2 rounded mb-4 text-center"/>

            <div className="flex gap-4">
              <button onClick={confirmPayment}
                className="flex-1 bg-green-600 text-white py-3 rounded-xl font-bold">
                تأكيد
              </button>
              <button onClick={() => setShowPayment(false)}
                className="flex-1 bg-gray-100 py-3 rounded-xl font-bold">
                إلغاء
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ===== الفوتر ===== */}
      <footer className="bg-blue-900 text-white py-8 text-center mt-10">
        © 2024 AutoSouk.ma — جميع الحقوق محفوظة
      </footer>

    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
